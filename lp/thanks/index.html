<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ完了 | 小さく進めて大きく変える合同会社</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FAFAF7;
    --bg-soft: #F1EFE8;
    --ink: #0E0E0C;
    --ink-2: #2A2A28;
    --ink-3: #5C5C58;
    --ink-4: #8E8E88;
    --rule: #DCD9D0;
    --accent: #1F4E3D;
    --accent-deep: #133A2C;
    --accent-soft: #E5EDE8;
    --accent-line: #B7C9C0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: "IBM Plex Sans JP", "IBM Plex Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.85;
    font-size: 15.5px;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
  }

  .card {
    max-width: 640px;
    width: 100%;
    background: #fff;
    border: 1px solid var(--rule);
    padding: 60px 52px;
    position: relative;
  }
  .card::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px;
    width: 80px; height: 5px;
    background: var(--accent);
  }

  .check-circle {
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
  }
  .check-circle svg { width: 24px; height: 24px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.4;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .body-text {
    font-size: 15px;
    color: var(--ink-3);
    line-height: 1.95;
    margin-bottom: 40px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--rule);
  }

  .timerex-block {
    background: var(--bg-soft);
    border: 1px solid var(--rule);
    padding: 28px 28px 32px;
  }
  .timerex-block-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-4);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .timerex-block-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .timerex-block-desc {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.8;
    margin-bottom: 20px;
  }
  .timerex-btn {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    text-decoration: none;
    padding: 14px 32px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .timerex-btn:hover { background: var(--accent-deep); }

  .back-link {
    display: inline-block;
    margin-top: 32px;
    font-size: 13px;
    color: var(--ink-4);
    text-decoration: none;
    font-family: "IBM Plex Mono", monospace;
    letter-spacing: 0.04em;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-link:hover { color: var(--ink); border-bottom-color: var(--rule); }

  footer {
    background: var(--bg);
    border-top: 1px solid var(--rule);
    padding: 24px;
    text-align: center;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    .card { padding: 40px 24px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<main>
  <div class="card">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="label">Thank you</div>
    <h1>お問い合わせを<br>受け付けました</h1>
    <p class="body-text">
      ご連絡いただきありがとうございます。<br>
      内容を確認のうえ、<strong>2営業日以内</strong>にご返信いたします。<br>
      メールが届かない場合は、迷惑メールフォルダもご確認ください。
    </p>

    <div class="timerex-block">
      <div class="timerex-block-label">Optional</div>
      <div class="timerex-block-title">日程をすぐに確定したい方へ</div>
      <p class="timerex-block-desc">
        返信をお待ちいただかなくても、カレンダーから直接ご都合の良い日時をご選択いただけます。
        ご予約後は確認メールが自動で届きます。
      </p>
      <a href="https://timerex.net/s/k.fifty.1110_2dd1/72e79cc3/" target="_blank" rel="noopener" class="timerex-btn">
        カレンダーで日程を選ぶ →
      </a>
    </div>

    <a href="/" class="back-link" id="back-link">← トップへ戻る</a>
  </div>
</main>

<footer>
  © 2025 Chiisaku Susumete Ookiku Kaeru, LLC.
</footer>

<script>
  // 流入元に応じて「戻るリンク」を調整
  var params = new URLSearchParams(window.location.search);
  var from = params.get('from');
  var backLink = document.getElementById('back-link');
  if (from === 'product') {
    backLink.href = '../product/';
    backLink.textContent = '← サービスページに戻る';
  } else if (from === 'dx') {
    backLink.href = '../dx/';
    backLink.textContent = '← DXページに戻る';
  } else if (from === 'startup') {
    backLink.href = '../startup/';
    backLink.textContent = '← スタートアップページに戻る';
  }
</script>

</body>
</html>
